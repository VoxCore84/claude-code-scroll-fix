# tmux config for Claude Code scroll fix
# Copy to ~/.tmux.conf
#
# Key feature: mouse scrolling works naturally — scroll up to read,
# and you're in copy/scroll mode automatically. The viewport is
# completely decoupled from Claude Code's cursor repositioning.

# Enable mouse — scroll with mouse wheel, click to select panes
set -g mouse on

# Large scrollback buffer (default is 2000 — way too small for Claude sessions)
set -g history-limit 100000

# Better colors
set -g default-terminal "screen-256color"

# Status bar reminder
set -g status-style bg=colour235,fg=colour136
set -g status-left "[tmux] "
set -g status-right "%H:%M"

# Don't wait for escape sequences (faster response to keybindings)
set -sg escape-time 10
